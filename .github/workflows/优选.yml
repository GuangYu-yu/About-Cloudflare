name: 列表过滤脚本（两阶段）

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 */3 * *"

jobs:
  run-script-part1:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5小时超时
    steps:
      - name: 检查出代码库
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml beautifulsoup4 lxml

      - name: 运行列表过滤脚本（第一部分）
        run: |
          python 提取列表中Cloudflare域名.py --part 1
          
      - name: 上传中间结果
        uses: actions/upload-artifact@v3
        with:
          name: intermediate-results
          path: |
            intermediate_results.json
            temp_domains.yaml

  run-script-part2:
    needs: run-script-part1
    runs-on: ubuntu-latest
    steps:
      - name: 检查出代码库
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml beautifulsoup4 lxml

      - name: 下载中间结果
        uses: actions/download-artifact@v3
        with:
          name: intermediate-results

      - name: 运行列表过滤脚本（第二部分）
        run: |
          python 提取列表中Cloudflare域名.py --part 2

      - name: 检查是否有更改
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "没有需要提交的更改"
            exit 0
          fi

      - name: 提交并推送更改
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "下载并处理文件于 $(date '+%Y/%m/%d %H:%M:%S')" || echo "没有需要提交的更改，跳过提交。"
          git pull --rebase
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push || echo "没有需要推送的更改，跳过推送。"
