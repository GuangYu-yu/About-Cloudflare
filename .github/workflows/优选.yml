name: 优选域名和IP

on:
  schedule:
    - cron: "0 16 */3 * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  fetch_domains:
    runs-on: ubuntu-latest
    steps:
      - name: 检查出代码库
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 获取域名列表
        run: python fetch_domains.py

      - name: 上传域名列表
        uses: actions/upload-artifact@v3
        with:
          name: domain-list
          path: temp_domains.txt

  query_ips:
    needs: fetch_domains
    runs-on: ubuntu-latest
    strategy:
      matrix:
        query_method: [bgp, dns_google]
    steps:
      - name: 检查出代码库
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4

      - name: 下载域名列表
        uses: actions/download-artifact@v3
        with:
          name: domain-list

      - name: 查询IP地址
        run: python query_ip.py ${{ matrix.query_method }}

      - name: 上传查询结果
        uses: actions/upload-artifact@v3
        with:
          name: ip-results-${{ matrix.query_method }}
          path: ip_results_${{ matrix.query_method }}.txt

  optimize_results:
    needs: query_ips
    runs-on: ubuntu-latest
    steps:
      - name: 检查出代码库
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 下载所有查询结果
        uses: actions/download-artifact@v3

      - name: 优化结果
        run: python optimize_results.py

      - name: 检查是否有更改
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "没有需要提交的更改"
            exit 0
          fi

      - name: 提交并推送更改
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Downloaded and processed files on $(date '+%Y/%m/%d %H:%M:%S')" || echo "没有需要提交的更改，跳过提交。"
          git pull --rebase
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push || echo "没有需要推送的更改，跳过推送。"
